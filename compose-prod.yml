services:
  backend:
    container_name: seg-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:8000"
    healthcheck:
      test: curl -s -I http://backend:8000/docs >/dev/null || exit 1
      interval: 20s
      retries: 10
      start_period: 40s
      start_interval: 5s
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
  db:
    container_name: seg-db
    image: postgres:18.1-trixie@sha256:5ec39c188013123927f30a006987c6b0e20f3ef2b54b140dfa96dac6844d883f
    restart: unless-stopped
    environment:
      - POSTGRES_DB=seg
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'pg_isready -U postgres -d seg'",
        ]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s
      start_interval: 5s
  cache:
    container_name: seg-cache
    image: redis:alpine3.22@sha256:6cbef353e480a8a6e7f10ec545f13d7d3fa85a212cdcc5ffaf5a1c818b9d3798
    ports:
      - '6379:6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 20s
      retries: 10
      start_period: 40s
      start_interval: 5s

volumes:
  db_data: