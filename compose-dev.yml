services:
  backend:
    container_name: seg-backend
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: curl -s -I http://backend:8000/docs >/dev/null || exit 1
      interval: 20s
      retries: 10
      start_period: 40s
      start_interval: 5s
    depends_on:
      - db
      - cache
  db:
    container_name: seg-db
    image: postgres:17.4-bookworm
    restart: unless-stopped
    environment:
      - POSTGRES_DB=seg
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data/
    ports:
      - '5432:5432'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'pg_isready -U postgres -d seg'",
        ]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s
      start_interval: 5s
  cache:
    container_name: seg-cache
    image: redis:7.4.2-bookworm
    ports:
      - '6379:6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 20s
      retries: 10
      start_period: 40s
      start_interval: 5s

volumes:
  db_data: